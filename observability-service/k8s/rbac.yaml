apiVersion: v1
kind: ServiceAccount
metadata:
  name: observability-service
  namespace: chatcraft
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: observability-service-reader
rules:
  - apiGroups: [""]
    resources: [pods, services, events, configmaps, pods/log]
    verbs: [get, list, watch]
  - apiGroups: ["apps"]
    resources: [deployments, replicasets, statefulsets]
    verbs: [get, list]
  - apiGroups: ["batch"]
    resources: [jobs, cronjobs]
    verbs: [get, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: observability-service-reader-binding
subjects:
  - kind: ServiceAccount
    name: observability-service
    namespace: chatcraft
roleRef:
  kind: ClusterRole
  name: observability-service-reader
  apiGroup: rbac.authorization.k8s.io
